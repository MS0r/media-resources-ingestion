syntax = "proto3";

package ingest;

service IngestService {
  rpc Enqueue(EnqueueRequest) returns (EnqueueResponse);
  rpc GetBatchStatus(GetBatchStatusRequest) returns (BatchStatus);
  rpc GetJobStatus(GetJobStatusRequest) returns (JobDetail);
  rpc ListJobs(ListJobsRequest) returns (ListJobsResponse);
  rpc CancelJob(CancelJobRequest) returns (ActionResponse);
  rpc CancelBatch(CancelBatchRequest) returns (ActionResponse);
  rpc RetryJob(RetryJobRequest) returns (ActionResponse);
  rpc ListFiles(ListFilesRequest) returns (ListFilesResponse);
  rpc GetFile(GetFileRequest) returns (FileMetadata);
}

message EnqueueRequest {
  string yaml_content = 1;
  int32 priority = 2;
  int32 file_workers = 3;
  bool dry_run = 4;
}

message EnqueueResponse {
  string batch_id = 1;
  int32 job_count = 2;
}

message GetBatchStatusRequest {
  string batch_id = 1;
}

message BatchStatus {
  string batch_id = 1;
  string status = 2;
  string created_at = 3;
  int32 total_jobs = 4;
  repeated string job_ids = 5;
}

message GetJobStatusRequest {
  string job_id = 1;
}

message JobDetail {
  string job_id = 1;
  string batch_id = 2;
  string status = 3;
  string url = 4;
  string error = 5;
  int32 retry_count = 6;
  string created_at = 7;
}

message ListJobsRequest {
  string filter = 1;
  int32 limit = 2;
}

message ListJobsResponse {
  repeated JobDetail jobs = 1;
}

message CancelJobRequest {
  string job_id = 1;
}

message CancelBatchRequest {
  string batch_id = 1;
}

message ActionResponse {
  bool success = 1;
  string message = 2;
}

message RetryJobRequest {
  string job_id = 1;
}

message ListFilesRequest {
  string mime_type = 1;
  string provider = 2;
  int32 limit = 3;
}

message ListFilesResponse {
  repeated FileMetadata files = 1;
}

message GetFileRequest {
  string hash = 1;
}

message FileMetadata {
  string file_hash = 1;
  string original_url = 2;
  string storage_provider = 3;
  string storage_path = 4;
  uint64 original_file_size = 5;
  uint64 compressed_file_size = 6;
  double compression_ratio = 7;
  string mime_type = 8;
  string upload_date = 9;
}
