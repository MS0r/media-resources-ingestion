[scheduler]
file_workers = 5
chunk_workers = 8
max_pending_jobs = 10_000
max_per_host = 2
job_timeout_secs = 7200          # max wall-clock per job (download+compress+upload)

[compression]
threshold_mb = 512
quality = 95
max_compression_seconds = 300

[storage]
default_provider = "local"
default_path = "~/downloads"
chunk_size = "128MB"
temp_dir = "/tmp/ingest"

[retry]
running_job_ttl_secs = 3600      # lease TTL; heartbeat refreshes every 30s while running
max_attempts = 3                 # max retries per job before permanent failure
backoff_secs = [5, 30, 120]      # delay before each retry attempt (indexed by retry_count)